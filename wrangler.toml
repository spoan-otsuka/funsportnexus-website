name = "funsportnexus-website"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

# カスタムドメイン
# Cloudflare DNS で funsportnexus.org が管理されているため、
# このデプロイで自動で DNS レコード + SSL証明書 + ルーティング が設定されます。
# 本番 apex (funsportnexus.org) と、検証用サブドメイン (next.funsportnexus.org) を並列で保持。
# 問題があれば apex 行を外して再デプロイで `next.` のみに戻せる（ロールバック 約5分）。
routes = [
  { pattern = "funsportnexus.org", custom_domain = true },
  { pattern = "next.funsportnexus.org", custom_domain = true },
]

# ============================================
# 静的アセット（Astro ビルド成果物）
# ============================================
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ============================================
# Cloudflare D1 データベース（申込システム統合）
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "fsn-apply-db"
database_id = "358323e4-53c6-4fa2-b0ac-b871133b2cd0"

# ============================================
# 環境変数（Cloudflare ダッシュボードで設定）
# ============================================
# RESEND_API_KEY       ─ Resend API キー
# FROM_EMAIL           ─ info@funsportnexus.org
# FROM_NAME            ─ fun sport nexus 運営事務局
# SLACK_WEBHOOK_URL    ─ Slack Webhook URL
# ADMIN_EMAIL_FALLBACK ─ funsportnexus@spoan.or.jp
# MICROCMS_SERVICE_DOMAIN ─ funsportnexus
# MICROCMS_API_KEY     ─ microCMS API キー（Cloudflare Pages でシークレット設定）

# 静的変数（公開してOK）はここに記載してビルド時に Astro 側で読める
[vars]
MICROCMS_SERVICE_DOMAIN = "funsportnexus"
FROM_EMAIL = "info@funsportnexus.org"
FROM_NAME = "fun sport nexus 運営事務局"
ADMIN_EMAIL_FALLBACK = "funsportnexus@spoan.or.jp"
SITE_URL = "https://funsportnexus.org"
PUBLIC_GA4_ID = "G-160BF6GL3W"

# ============================================
# 観察可能性（Workers Logs）
# ============================================
# invocation_logs = true で、リクエストごとの起動ログ（method / path / status / cf-ray 等）を自動記録
# Free プラン上限: 200K events/day。超過分はサンプリング
[observability.logs]
enabled = true
invocation_logs = true
